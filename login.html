<!DOCTYPE html>
<html>
<head>
<title>Login - Blox Fruit Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:url("login-bg.jpg") no-repeat center center fixed;
    background-size:cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

.box{
    background:rgba(15,23,42,0.65);
    backdrop-filter:blur(12px);
    border:2px solid rgba(0,255,255,0.4);
    box-shadow:0 0 30px rgba(0,255,255,0.5);
    padding:40px;
    width:340px;
    border-radius:20px;
    text-align:center;
    color:white;
}

h1{
    color:#00ffff;
    margin-bottom:25px;
    text-shadow:0 0 10px cyan;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.9);
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0099ff;
    box-shadow:0 0 15px cyan;
}

a{
    color:#00ffff;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    color:white;
}

.subtitle{
    color:#dbeafe;
    margin-bottom:20px;
    font-size:14px;
}
</style>

</head>

<body>

<div class="box">

<h1>Blox Fruit Hub</h1>

<p class="subtitle">Login to continue your adventure</p>

<form action="/login" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="register.html">Create Account</a>

</div>

</body>
</html>
