<!DOCTYPE html>
<html>
<head>
<title>Register - Blox Fruit Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:url("register-bg.jpg") no-repeat center center fixed;
    background-size:cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

.box{
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(12px);
    padding:40px;
    width:320px;
    border-radius:20px;
    box-shadow:0 0 30px cyan;
    color:white;
    text-align:center;
}

h1{
    color:#00ffff;
    margin-bottom:20px;
    text-shadow:0 0 10px cyan;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:95%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0099cc;
    box-shadow:0 0 15px cyan;
}

a{
    color:#00ffff;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    color:white;
}
</style>

</head>

<body>

<div class="box">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<br>

<a href="login.html">Already have an account? Login</a>

</div>

</body>
</html>
